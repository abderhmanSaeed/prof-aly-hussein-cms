# =============================================================================
# Nginx site — Prof. Aly Hussein CMS
#   TLS termination (Let's Encrypt) + reverse proxy to Kestrel (127.0.0.1:5000)
#   Compression · static caching · security headers · large uploads · /health
#
# Install:
#   sudo cp deploy/profalycms.conf /etc/nginx/sites-available/profalycms.conf
#   sudo ln -s /etc/nginx/sites-available/profalycms.conf /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#
# Replace every "example.com" with your real domain before enabling.
# =============================================================================

# WebSocket/upgrade support (harmless if unused). Must live in the http{} context,
# which is where site files under sites-enabled/ are included.
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

# Kestrel upstream.
upstream profalycms_backend {
    server 127.0.0.1:5000;
    keepalive 32;
}

# ---- HTTP :80 — ACME challenge + redirect everything to HTTPS ----------------
server {
    listen      80;
    listen      [::]:80;
    server_name example.com www.example.com;

    # Let's Encrypt webroot challenge (see certbot certonly --webroot in the guide).
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ---- HTTPS :443 — reverse proxy ---------------------------------------------
server {
    listen      443 ssl;
    listen      [::]:443 ssl;
    http2       on;
    server_name example.com www.example.com;

    # ---- TLS (Let's Encrypt) ------------------------------------------------
    ssl_certificate         /etc/letsencrypt/live/example.com/fullchain.pem;
    ssl_certificate_key     /etc/letsencrypt/live/example.com/privkey.pem;
    ssl_trusted_certificate /etc/letsencrypt/live/example.com/chain.pem;

    ssl_protocols             TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_session_cache         shared:SSL:10m;
    ssl_session_timeout       1d;
    ssl_session_tickets       off;
    # OCSP stapling (requires ssl_trusted_certificate above).
    ssl_stapling         on;
    ssl_stapling_verify  on;
    resolver             1.1.1.1 8.8.8.8 valid=300s;
    resolver_timeout     5s;

    # ---- Large uploads ------------------------------------------------------
    # App caps documents at 50 MB; allow headroom for multipart boundaries.
    client_max_body_size 60m;
    client_body_timeout  120s;

    # ---- Compression --------------------------------------------------------
    # The app also compresses (Brotli/Gzip); Nginx will not double-encode an
    # already-encoded upstream response. This covers anything served uncompressed.
    gzip              on;
    gzip_vary         on;
    gzip_proxied      any;
    gzip_comp_level   5;
    gzip_min_length   1024;
    gzip_types        text/plain text/css application/json application/javascript
                      text/javascript application/xml application/rss+xml
                      image/svg+xml application/manifest+json;

    # ---- Security headers (edge) --------------------------------------------
    # HSTS belongs at the TLS terminator. The APPLICATION already emits CSP,
    # X-Frame-Options, X-Content-Type-Options, Referrer-Policy and Permissions-Policy
    # (Stage 90) — they are intentionally NOT repeated here to avoid duplicate
    # headers. Uncomment below only if you prefer to manage them at the edge AND
    # disable them in the app.
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    # add_header X-Frame-Options            "SAMEORIGIN" always;
    # add_header X-Content-Type-Options     "nosniff" always;
    # add_header Referrer-Policy            "strict-origin-when-cross-origin" always;
    # add_header Permissions-Policy         "camera=(), microphone=(), geolocation=()" always;

    # Do not expose the Nginx version.
    server_tokens off;

    # ---- Health check (no access-log noise) ---------------------------------
    location = /health {
        proxy_pass         http://profalycms_backend;
        proxy_set_header   Host $host;
        proxy_set_header   X-Forwarded-Proto $scheme;
        access_log         off;
    }

    # ---- Static caching -----------------------------------------------------
    # Framework assets are fingerprinted (asp-append-version) and uploaded media is
    # immutable; the app already sends Cache-Control, and Nginx reinforces it at the
    # edge. Requests still pass through to Kestrel (files are not on the Nginx host).
    location ~* ^/(css|js|lib|images|favicon|uploads)/ {
        proxy_pass         http://profalycms_backend;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        expires            7d;
        add_header         Cache-Control "public";
        access_log         off;
    }

    # ---- Application (reverse proxy) ----------------------------------------
    location / {
        proxy_pass          http://profalycms_backend;
        proxy_http_version  1.1;
        proxy_set_header    Host              $host;
        proxy_set_header    X-Real-IP         $remote_addr;
        proxy_set_header    X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header    X-Forwarded-Proto $scheme;
        proxy_set_header    X-Forwarded-Host  $host;
        proxy_set_header    Upgrade           $http_upgrade;
        proxy_set_header    Connection        $connection_upgrade;
        proxy_cache_bypass  $http_upgrade;
        proxy_read_timeout  120s;
        proxy_connect_timeout 15s;
    }
}
